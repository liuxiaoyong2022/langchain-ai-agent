  mysql-db:
    # 指定容器的名称
    container_name: mysql9
    # 指定镜像和版本
    image: mysql:9.0
    ports:
      - "3306:3306"
    restart: always
    # 容器日志大小配置
    logging:
      driver: 'json-file'
      options:
        max-size: '5g'
    environment:
      # 配置root密码
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: abcd1234
    volumes:
      # 挂载数据目录
      - "./docker/volumes/mysql/data:/var/lib/mysql"
      # 挂载配置文件目录
      - "./docker/volumes/mysql/config:/etc/mysql/conf.d"


networks:
  app-network:
    driver: bridge
